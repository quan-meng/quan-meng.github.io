<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f77f00"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="gf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f77f00"/>
      <stop offset="100%" stop-color="#fcbf49"/>
    </linearGradient>
    <linearGradient id="gs" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0a1628"/>

  <!-- LEFT: partial/incomplete cube (warm orange) -->
  <!-- Top face dashed -->
  <path d="M18 20 L32 13 L38 16" fill="none" stroke="#f77f00" stroke-width="2.2" stroke-dasharray="2.5 2" stroke-linecap="round"/>
  <!-- Left face partial -->
  <path d="M18 20 L18 36 L26 40" fill="none" stroke="#f77f00" stroke-width="2.2" stroke-dasharray="2.5 2" stroke-linecap="round"/>
  <!-- Sparse dots -->
  <circle cx="21" cy="26" r="2" fill="#f77f00" opacity="0.9"/>
  <circle cx="26" cy="22" r="1.6" fill="#f77f00" opacity="0.7"/>
  <circle cx="19" cy="32" r="1.4" fill="#fcbf49" opacity="0.8"/>
  <circle cx="25" cy="30" r="1.8" fill="#f77f00" opacity="0.6"/>
  <circle cx="22" cy="37" r="1.2" fill="#fcbf49" opacity="0.5"/>

  <!-- CENTER: flow arrow -->
  <path d="M29 28 L35 28" stroke="url(#gc)" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M33 25 L36.5 28 L33 31" fill="none" stroke="#00b4d8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT: complete solid cube (cyan) -->
  <!-- Top face -->
  <path d="M32 13 L46 20 L32 27 L18 20 Z" fill="none" stroke="none"/>
  <path d="M38 16 L46 20 L32 27 L32 13" fill="#00b4d8" fill-opacity="0.3" stroke="#00b4d8" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Right face -->
  <path d="M32 27 L46 20 L46 36 L32 43 Z" fill="#0077b6" fill-opacity="0.35" stroke="#00b4d8" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Front face -->
  <path d="M32 27 L32 43 L26 40" fill="#00b4d8" fill-opacity="0.15" stroke="#00b4d8" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Inner edges for detail -->
  <line x1="39" y1="23.5" x2="39" y2="39.5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="25.5" x2="43" y2="21.5" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Eye (visibility) at top -->
  <ellipse cx="32" cy="7" rx="10" ry="4" fill="none" stroke="url(#gc)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="7" r="2.2" fill="url(#gc)"/>
  <circle cx="32" cy="7" r="0.8" fill="#0a1628"/>
</svg>
